version: '3.8'
services:
  postgres:
    image: postgres:16
    container_name: trade_db
    environment:
      POSTGRES_DB: trade_analytics
      POSTGRES_USER: etl_user
      POSTGRES_PASSWORD: etl_password
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:

